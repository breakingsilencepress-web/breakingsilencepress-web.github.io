<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — BreakingSilence Press</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Crimson+Pro:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-page:       #0B0C1A;
            --amber:         #C8860A;
            --amber-light:   #E8A820;
            --amber-dim:     rgba(200,134,10,0.10);
            --amber-border:  rgba(200,134,10,0.22);
            --text-h:        #F5F0E8;
            --text-body:     #CEC9C0;
            --text-muted:    #8A8780;
            --border-solid:  rgba(255,255,255,0.07);
            --font-display:  'Playfair Display', Georgia, serif;
            --font-body:     'Crimson Pro', Georgia, serif;
            --font-mono:     'Space Mono', monospace;
            --shadow-btn:    0 2px 14px rgba(200,134,10,0.28);
            --shadow-btn-h:  0 4px 28px rgba(200,134,10,0.52);
        }

        body {
            background: var(--bg-page);
            color: var(--text-body);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-text {
            position: fixed;
            font-family: var(--font-display);
            font-size: 40vw;
            color: rgba(255,255,255,0.02);
            user-select: none;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            font-weight: 700;
            letter-spacing: -2vw;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(200,134,10,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            padding: 0 24px;
        }

        .eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--amber);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(80px, 18vw, 180px);
            font-weight: 700;
            line-height: 1;
            color: var(--text-h);
        }

        h1 span { color: var(--amber); }

        h2 {
            font-family: var(--font-display);
            font-size: clamp(20px, 3vw, 28px);
            font-weight: 700;
            color: var(--text-h);
            margin-top: 8px;
        }

        p {
            margin-top: 16px;
            font-size: 17px;
            color: var(--text-muted);
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: var(--border-solid);
            margin: 32px auto;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-block;
            padding: 13px 36px;
            background: var(--amber);
            color: #0B0C1A;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 3px;
            box-shadow: var(--shadow-btn);
            transition: background 0.24s, box-shadow 0.24s, transform 0.24s;
        }

        .btn-primary:hover {
            background: var(--amber-light);
            box-shadow: var(--shadow-btn-h);
            transform: translateY(-2px);
        }

        .btn-secondary {
            display: inline-block;
            padding: 13px 36px;
            background: transparent;
            color: var(--amber);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid var(--amber-border);
            border-radius: 3px;
            transition: background 0.24s, border-color 0.24s, transform 0.24s;
        }

        .btn-secondary:hover {
            background: var(--amber-dim);
            border-color: var(--amber-light);
            transform: translateY(-2px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-text">404</div>
    <div class="container">
        <p class="eyebrow">Error 404</p>
        <h1>4<span>0</span>4</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <div class="divider"></div>
        <div class="actions">
            <a href="index.html" class="btn-primary">Back to Homepage</a>
            <a href="evidence.html" class="btn-secondary">Evidence Library</a>
        </div>
    </div>
</body>
</html>
