<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified — BreakingSilence Press</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Crimson+Pro:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-X0DX8WVLPT');
    </script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-page:       #0B0C1A;
            --bg-card:       #14152A;
            --amber:         #C8860A;
            --amber-light:   #E8A820;
            --amber-pale:    #F5C842;
            --amber-dim:     rgba(200,134,10,0.12);
            --amber-border:  rgba(200,134,10,0.22);
            --amber-border-h:rgba(200,134,10,0.65);
            --text-h:        #F5F0E8;
            --text-body:     #CEC9C0;
            --text-muted:    #8A8780;
            --font-display:  'Playfair Display', Georgia, serif;
            --font-body:     'Crimson Pro', Georgia, serif;
            --font-mono:     'Space Mono', 'Courier New', monospace;
            --shadow-btn:    0 2px 14px rgba(200,134,10,0.28);
            --shadow-btn-h:  0 4px 28px rgba(200,134,10,0.52);
        }

        body {
            background: var(--bg-page);
            color: var(--text-h);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(200,134,10,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            padding: 0 24px;
        }

        .check {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 1.5px solid var(--amber-border);
            background: var(--amber-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 36px;
            animation: pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .check svg {
            width: 30px;
            height: 30px;
        }

        .eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--amber);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(56px, 10vw, 96px);
            font-weight: 700;
            line-height: 1;
            color: var(--text-h);
        }

        h1 span {
            color: var(--amber-light);
        }

        p {
            margin-top: 18px;
            font-size: 18px;
            color: var(--text-body);
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: var(--amber-border);
            margin: 32px auto;
        }

        a {
            display: inline-block;
            padding: 13px 36px;
            background: var(--amber);
            color: #0B0C1A;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 3px;
            box-shadow: var(--shadow-btn);
            transition: background 0.24s, box-shadow 0.24s, transform 0.24s;
        }

        a:hover {
            background: var(--amber-light);
            box-shadow: var(--shadow-btn-h);
            transform: translateY(-2px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check">
            <svg viewBox="0 0 24 24" fill="none" stroke="#C8860A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <p class="eyebrow">Email Confirmed</p>
        <h1>You're <span>Verified</span></h1>
        <p>Welcome to BreakingSilence Press. You'll receive updates when new chapters and evidence are released.</p>
        <div class="divider"></div>
        <a href="index.html">Back to Homepage</a>
    </div>
</body>
</html>
