<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribed — BreakingSilence Press</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Crimson+Pro:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-X0DX8WVLPT');
    </script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-page:       #0B0C1A;
            --amber:         #C8860A;
            --amber-light:   #E8A820;
            --amber-dim:     rgba(200,134,10,0.10);
            --amber-border:  rgba(200,134,10,0.22);
            --text-h:        #F5F0E8;
            --text-body:     #CEC9C0;
            --text-muted:    #8A8780;
            --border-solid:  rgba(255,255,255,0.07);
            --font-display:  'Playfair Display', Georgia, serif;
            --font-body:     'Crimson Pro', Georgia, serif;
            --font-mono:     'Space Mono', monospace;
            --shadow-btn:    0 2px 14px rgba(200,134,10,0.28);
            --shadow-btn-h:  0 4px 28px rgba(200,134,10,0.52);
        }

        body {
            background: var(--bg-page);
            color: var(--text-body);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(200,134,10,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            padding: 0 24px;
        }

        .icon {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 1.5px solid var(--amber-border);
            background: var(--amber-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 36px;
            animation: pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .icon svg {
            width: 28px;
            height: 28px;
        }

        .eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(48px, 9vw, 86px);
            font-weight: 700;
            line-height: 1;
            color: var(--text-h);
            margin-bottom: 0;
        }

        p {
            margin-top: 18px;
            font-size: 17px;
            color: var(--text-muted);
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: var(--border-solid);
            margin: 32px auto;
        }

        a {
            display: inline-block;
            padding: 13px 36px;
            background: transparent;
            color: var(--amber);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid var(--amber-border);
            border-radius: 3px;
            transition: background 0.24s, border-color 0.24s, transform 0.24s;
        }

        a:hover {
            background: var(--amber-dim);
            border-color: var(--amber-light);
            transform: translateY(-2px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#8A8780" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </div>
        <p class="eyebrow">Unsubscribed</p>
        <h1>You're Out</h1>
        <p>You've been removed from the BreakingSilence Press mailing list. You won't receive any further emails.</p>
        <div class="divider"></div>
        <a href="index.html">Back to Homepage</a>
    </div>
</body>
</html>
