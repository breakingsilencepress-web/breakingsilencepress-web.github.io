<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence — BreakingSilence Press</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Crimson+Pro:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-X0DX8WVLPT');
    </script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-page:        #0B0C1A;
            --bg-section:     #0F1020;
            --bg-card:        #14152A;
            --bg-card2:       #1A1B30;
            --amber:          #C8860A;
            --amber-light:    #E8A820;
            --amber-pale:     #F5C842;
            --amber-dim:      rgba(200,134,10,0.10);
            --amber-border:   rgba(200,134,10,0.22);
            --amber-border-h: rgba(200,134,10,0.65);
            --red:            #8B0000;
            --red-dim:        rgba(139,0,0,0.15);
            --text-h:         #F5F0E8;
            --text-body:      #CEC9C0;
            --text-muted:     #8A8780;
            --text-faint:     #5A5855;
            --border-solid:   rgba(255,255,255,0.07);
            --font-display:   'Playfair Display', Georgia, serif;
            --font-body:      'Crimson Pro', Georgia, serif;
            --font-mono:      'Space Mono', monospace;
            --shadow-card:    0 12px 48px rgba(0,0,0,0.55);
            --shadow-btn:     0 2px 14px rgba(200,134,10,0.28);
            --shadow-btn-h:   0 4px 28px rgba(200,134,10,0.52);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg-page);
            color: var(--text-body);
            font-family: var(--font-body);
            font-size: 18px;
            line-height: 1.75;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11,12,26,0.96);
            border-bottom: 1px solid var(--amber-border);
            padding: 18px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
        }

        .nav-logo {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.18em;
            color: var(--text-h);
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-logo span { color: var(--amber); }

        .nav-back {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--amber);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-back:hover { color: var(--amber-light); }

        /* HERO */
        .hero {
            padding: 72px 48px 56px;
            max-width: 900px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border-solid);
            animation: fadeUp 0.6s ease both;
        }

        .eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--amber);
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .eyebrow::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--amber-border);
            max-width: 80px;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 700;
            color: var(--text-h);
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .meta-tag {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
            background: var(--bg-card);
            border: 1px solid var(--border-solid);
            padding: 6px 14px;
            border-radius: 3px;
        }

        .meta-tag span { color: var(--amber); }

        /* LOADING / ERROR */
        .state-wrapper {
            max-width: 900px;
            margin: 80px auto;
            padding: 0 48px;
            text-align: center;
        }

        .state-wrapper p {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        /* DOCUMENTS */
        .documents {
            max-width: 900px;
            margin: 0 auto;
            padding: 56px 48px 100px;
        }

        .doc-count {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .doc-count span { color: var(--amber); }

        /* DOCUMENT CARD */
        .document {
            background: var(--bg-card);
            border: 1px solid var(--border-solid);
            border-radius: 6px;
            margin-bottom: 40px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            animation: fadeUp 0.6s ease both;
            transition: border-color 0.24s;
        }

        .document:hover {
            border-color: var(--amber-border);
        }

        .doc-header {
            padding: 28px 32px 24px;
            border-bottom: 1px solid var(--border-solid);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
        }

        .doc-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--amber);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .doc-heading {
            font-family: var(--font-display);
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 700;
            color: var(--text-h);
            line-height: 1.2;
        }

        .doc-tags {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .tag {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 3px;
        }

        .tag-filetype {
            background: var(--amber-dim);
            color: var(--amber-light);
            border: 1px solid var(--amber-border);
        }

        .tag-copyright {
            background: var(--red-dim);
            color: #e87070;
            border: 1px solid rgba(139,0,0,0.3);
        }

        /* BODY SECTIONS */
        .doc-body {
            padding: 28px 32px;
        }

        .field {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-solid);
        }

        .field:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .field-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--amber);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .field-value {
            color: var(--text-body);
            font-size: 17px;
            line-height: 1.7;
        }

        .field-value a {
            color: var(--amber-light);
            word-break: break-all;
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }

        .field-value a:hover { color: var(--amber-pale); }

        /* TWO-COL META */
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .meta-grid .field {
            padding: 20px 24px;
            margin: 0;
            border-bottom: 1px solid var(--border-solid);
            border-right: 1px solid var(--border-solid);
        }

        .meta-grid .field:nth-child(even) {
            border-right: none;
        }

        .meta-grid .field:nth-last-child(-n+2) {
            border-bottom: none;
        }

        /* ACTIONS */
        .doc-actions {
            padding: 24px 32px;
            background: var(--bg-card2);
            border-top: 1px solid var(--border-solid);
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 24px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 3px;
            transition: background 0.24s, box-shadow 0.24s, transform 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--amber);
            color: #0B0C1A;
            box-shadow: var(--shadow-btn);
        }

        .btn-primary:hover {
            background: var(--amber-light);
            box-shadow: var(--shadow-btn-h);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--amber-light);
            border: 1px solid var(--amber-border);
        }

        .btn-secondary:hover {
            border-color: var(--amber-border-h);
            background: var(--amber-dim);
            transform: translateY(-1px);
        }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border-solid);
            padding: 32px 48px;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        footer p {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }

        footer a {
            color: var(--amber);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 11px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            nav, .hero, .documents, footer { padding-left: 20px; padding-right: 20px; }
            .meta-grid { grid-template-columns: 1fr; }
            .meta-grid .field { border-right: none; }
            .meta-grid .field:nth-last-child(-n+2) { border-bottom: 1px solid var(--border-solid); }
            .meta-grid .field:last-child { border-bottom: none; }
            .doc-header { flex-direction: column; }
            .doc-tags { align-items: flex-start; flex-direction: row; }
        }
    </style>
</head>
<body>

    <nav>
        <a class="nav-logo" href="index.html">Breaking<span>Silence</span></a>
        <a class="nav-back" href="index.html">← Back to Site</a>
    </nav>

    <div id="heroSection" class="hero" style="display:none;">
        <p class="eyebrow" id="qrLabel">QR Code</p>
        <h1 id="chapterTitle">Loading...</h1>
        <div class="hero-meta" id="heroMeta"></div>
    </div>

    <div id="loadingState" class="state-wrapper">
        <p>Loading evidence...</p>
    </div>

    <div id="errorState" class="state-wrapper" style="display:none;">
        <p>No evidence found for this QR code.</p>
    </div>

    <div id="documentsSection" class="documents" style="display:none;">
        <p class="doc-count" id="docCount"></p>
        <div id="documentsList"></div>
    </div>

    <footer>
        <p>© 2026 Breaking Silence Press. All rights reserved.</p>
        <a href="index.html">← Return to Homepage</a>
    </footer>

    <script>
        const API_URL = "https://breakingsilencepress-webgithubio-production.up.railway.app";
        const params = new URLSearchParams(window.location.search);
        const qr = params.get('qr');

        if (!qr) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        } else {
            loadEvidence(qr);
        }

        async function loadEvidence(qrCode) {
            try {
                const response = await fetch(`${API_URL}/evidences-public`);
                const data = await response.json();
                const docs = data.evidences.filter(e => e.qrCode === qrCode);

                document.getElementById('loadingState').style.display = 'none';

                if (docs.length === 0) {
                    document.getElementById('errorState').style.display = 'block';
                    return;
                }

                // Hero
                const first = docs[0];
                document.title = `QR ${qrCode} — BreakingSilence Press`;
                document.getElementById('qrLabel').textContent = `QR Code ${qrCode}`;
                document.getElementById('chapterTitle').textContent = first.chapter;

                const meta = document.getElementById('heroMeta');
                meta.innerHTML = `
                    <span class="meta-tag">Chapter <span>${first.chapter}</span></span>
                    <span class="meta-tag">QR <span>${qrCode}</span></span>
                    <span class="meta-tag"><span>${docs.length}</span> Document${docs.length > 1 ? 's' : ''}</span>
                `;

                document.getElementById('heroSection').style.display = 'block';

                // Documents
                const docCount = document.getElementById('docCount');
                docCount.innerHTML = `Showing <span>${docs.length}</span> document${docs.length > 1 ? 's' : ''} for QR code <span>${qrCode}</span>`;

                const list = document.getElementById('documentsList');
                docs.forEach((doc, i) => {
                    const date = new Date(doc.date).toLocaleDateString('en-US', {
                        month: 'long', day: 'numeric', year: 'numeric'
                    });
                    const downloadDate = new Date(doc.downloadDate).toLocaleDateString('en-US', {
                        month: 'long', day: 'numeric', year: 'numeric'
                    });

                    const card = document.createElement('div');
                    card.className = 'document';
                    card.style.animationDelay = `${i * 0.1}s`;
                    card.innerHTML = `
                        <div class="doc-header">
                            <div>
                                <p class="doc-label">Document ${String(i + 1).padStart(2, '0')}</p>
                                <h2 class="doc-heading">${doc.heading}</h2>
                            </div>
                            <div class="doc-tags">
                                <span class="tag tag-filetype">${doc.fileType}</span>
                                <span class="tag tag-copyright">${doc.copyRightStatus}</span>
                            </div>
                        </div>
                        <div class="doc-body">
                            <div class="field">
                                <p class="field-label">Description</p>
                                <p class="field-value">${doc.description}</p>
                            </div>
                            <div class="field">
                                <p class="field-label">Full Details</p>
                                <p class="field-value">${doc.moreDescription}</p>
                            </div>
                            <div class="field">
                                <p class="field-label">Relevance to the Book</p>
                                <p class="field-value">${doc.relevance}</p>
                            </div>
                            <div class="meta-grid">
                                <div class="field">
                                    <p class="field-label">Source</p>
                                    <p class="field-value">${doc.source}</p>
                                </div>
                                <div class="field">
                                    <p class="field-label">Document Date</p>
                                    <p class="field-value">${date}</p>
                                </div>
                                <div class="field">
                                    <p class="field-label">Downloaded</p>
                                    <p class="field-value">${downloadDate}</p>
                                </div>
                                <div class="field">
                                    <p class="field-label">Original URL</p>
                                    <p class="field-value"><a href="${doc.originalUrl}" target="_blank" rel="noopener">${doc.originalUrl}</a></p>
                                </div>
                            </div>
                        </div>
                        <div class="doc-actions">
                            <a href="${doc.downloadUrl}" target="_blank" class="btn btn-primary">
                                <i class="fa-solid fa-download"></i> Download
                            </a>
                            <a href="${doc.readUrl}" target="_blank" class="btn btn-secondary">
                                <i class="fa-brands fa-readme"></i> Read Online
                            </a>
                        </div>
                    `;
                    list.appendChild(card);
                });

                document.getElementById('documentsSection').style.display = 'block';

            } catch (err) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
                console.error(err);
            }
        }
    </script>

</body>
</html>
