<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./css/admin.css">
    <link rel="icon" type="image/png" href="logo.png">
    <title>BreakingSilence</title>
</head>
<body>
    <div class="login-page">
        <div class="login-wrapper">
            <div class="logo">
                <a href="admin.html">BREAKING<span>SILENCE</span></a>
            </div>
            <p class="login-sub-heading">ADMIN PANEL</p>
            <span class="separator"></span>
            <div class="enter-token">
                <p><i class="fas fa-circle"></i> Enter your admin token to access the dashboard</p>
            </div>
            <form>
                <div class="token">
                    <p class="token-input-heading">ADMIN TOKEN</p>
                    <input type="text" placeholder="Enter the admin token" id="loginTokenInput" required>
                    <p class="input-error">Token invalid</p>
                </div>
                <div class="password">
                    <p class="token-input-heading">PASSWORD</p>
                    <input type="password" placeholder="Enter your password" id="loginPasswordInput" required>
                    <p class="input-error">Password invalid</p>
                </div>
                <button type="button" class="login-button">Access Dashboard<i class="fas fa-arrow-right"></i></button>
            </form>
            <p class="login-copyright">BreakingSilence © 2025 · Restricted access</p>
        </div>
    </div>
    <script src="./js/global.js"></script>
</body>
</html>
